<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Rajtvonal SimMasters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #10101e;
  --bg-row: #12122a;
  --bg-row-alt: #0e0e22;
  --red: #db0a40;
  --red-glow: rgba(219,10,64,0.3);
  --yellow: #ffc906;
  --text-primary: #f0f0f5;
  --text-secondary: #8888aa;
  --border: #1e1e3a;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* Glow */
.bg-glow {
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 500px;
  background: radial-gradient(ellipse, var(--red-glow) 0%, transparent 70%);
  z-index: 0;
}

/* HEADER */
.header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 80px 20px 40px;
}

.title {
  font-size: 3.5rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  color: var(--red);
  text-transform: uppercase;
}

.title span {
  color: var(--text-primary);
  text-shadow: 0 0 40px var(--red-glow);
}

.subtitle {
  margin-top: 20px;
  letter-spacing: 0.4em;
  font-size: 12px;
  color: var(--text-secondary);
}

/* BUTTONS */
.menu {
  max-width: 600px;
  margin: 40px auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 1;
  position: relative;
}

.menu a {
  text-decoration: none;
}

.menu button {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: white;
  padding: 20px;
  border-radius: 10px;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.25s;
}

.menu button:hover {
  border-color: var(--red);
  background: #1a1a3a;
  transform: translateY(-2px);
}

/* Footer */
.footer {
  text-align: center;
  font-size: 10px;
  margin: 60px 0;
  color: var(--text-secondary);
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="header">
  <div class="title">Rajtvonal <span>SimMasters</span></div>
  <div class="subtitle">FŐMENÜ</div>
</div>

<div class="menu">
  <a href="elokvali/"><button>Előkvalifikáció</button></a>
  <a href="szabalyzat/"><button>Szabályzat</button></a>
  <a href="versenynaptar/"><button>Versenynaptár</button></a>
  <a href="verseny-beallitasok/"><button>Verseny Beállítások</button></a>
  <a href="BOP/"><button>BOP</button></a>
  <a href="idojaras/"><button>Időjárás</button></a>
  <a href="eredmenyek/"><button>Eredmények</button></a>
</div>

<div class="footer">
  Rajtvonal SimMasters • 2026
</div>

</body>
</html>
