<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Sim Masters Időjárás</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../src/styles/theme.css">
<link rel="stylesheet" href="../../src/styles/base.css">
<link rel="stylesheet" href="../../src/styles/components.css">
<link rel="stylesheet" href="../../src/styles/animations.css">
<link rel="stylesheet" href="../../src/styles/pages.css">
</head>

<body>

<div class="bg-glow animate"></div>

<div class="back-button" onclick="goBack()">
  ← Vissza
</div>

<div class="theme-toggle" onclick="toggleTheme()">
  🌙
</div>

<div class="header">
  <div class="title">Rajtvonal <span>Sim Masters</span></div>
  <div class="subtitle">IDŐJÁRÁS</div>
</div>

<div class="container weather">
  <div class="weather-track">
    <img id="weatherTrackFlag" alt="Pálya zászló">
    <div id="weatherTrackName" class="weather-track-name">Aktuális pálya</div>
  </div>

  <div class="weather-summary">
    <div class="weather-metric">
      <div id="weatherIcon" class="weather-icon">☀️</div>
      <div>
        <div class="weather-label">Időjárás</div>
        <div id="weatherLabel" class="weather-value">Napos</div>
      </div>
    </div>

    <div class="weather-metric">
      <div class="weather-icon">🌡️</div>
      <div>
        <div class="weather-label">Hőmérséklet</div>
        <div id="temperatureValue" class="weather-value">18-21 °C</div>
      </div>
    </div>
  </div>

  <div class="weather-details">
    <div class="level-1-title">Részletes előrejelzés</div>
    <div id="weatherDetails"></div>
  </div>
</div>

<div class="footer">
  Rajtvonal Sim Masters • Időjárás
</div>

<script src="../../src/scripts/common/theme.js"></script>
<script src="../../src/scripts/common/navigation.js"></script>
<script src="../../src/scripts/pages/simmasters/weather.js"></script>
</body>
</html>
