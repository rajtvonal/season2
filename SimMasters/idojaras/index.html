<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Sim Masters Időjárás</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

</head>

<body>
<div class="bg-glow animate"></div>
<canvas id="particles"></canvas>

<div class="header">
  <div class="title">Rajtvonal <span>Sim Masters</span></div>
  <div class="subtitle">IDŐJÁRÁS</div>
</div>

<div class="container weather">
  <div class="weather-track">
    <img id="weatherTrackFlag" alt="Pálya zászló">
    <div id="weatherTrackName" class="weather-track-name">Aktuális pálya</div>
  </div>

  <div class="weather-summary">
    <div class="weather-metric">
      <div id="weatherIcon" class="weather-icon">ico</div>
      <div>
        <div class="weather-label">Időjárás</div>
        <div id="weatherLabel" class="weather-value">---</div>
      </div>
    </div>

    <div class="weather-metric">
      <div class="weather-icon">🌡️</div>
      <div>
        <div class="weather-label">Hőmérséklet</div>
        <div id="temperatureValue" class="weather-value">x-y °C</div>
      </div>
    </div>
  </div>

  <div class="weather-details">
    <div class="level-1-title">Részletes előrejelzés</div>
    <div id="weatherDetails"></div>
  </div>
</div>

<div class="footer">
  Rajtvonal Sim Masters • Időjárás
  <br>
  Legutóbbi módosítás: 2026. 06. 26. | 15:28
</div>

<div class="container-sponsor-left"></div>
<div class="container-sponsor-right"></div>
<div class="container-sponsor-bottom"></div>

<script type="module" src="../../src/scripts/router.js"></script>
</body>
</html>
