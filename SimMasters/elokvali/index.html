<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Rajtvonal Előkvalifikáció</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

</head>

<body>
<div class="bg-glow animate"></div>
<canvas id="particles"></canvas>

<div class="header">
  <div class="title">Rajtvonal <span>Előkvalifikáció</span></div>
  <div class="subtitle">LEADERBOARD</div>
</div>

<div class="bekuldes subtitle">
  Az előkvalifikáció időtartamán belül
  <div class="next-race-box" id="nextRaceBox" style="margin-top: 20px;">
  </div>
  3 időeredmény beküldésére van lehetőség pályánként
</div>
<a href="bekuldes/" class="bekuldes link" rel="noopener noreferrer" style="text-align: center;">
  Beküldés Menete<br>[KATT]
</a>
<div class="bekuldes subtitle">
  <span style="color: var(--color-accent);">Legjobb 10 Hyper</span> 
  <br>
  <span style="color: var(--color-accent);">Legjobb 24 LMGT3</span>
  <br>
  versenyző kerül be a ligába
</div>

<div class="container navbar" style="justify-self: center;">
    <button id="defaultBtn" class="active" onclick="loadData('../../database/SM/elokvali/elokvali_hyper.csv', this)">Hyper</button>
    <button onclick="loadData('../../database/SM/elokvali/elokvali_gt.csv', this)">LMGT3</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Keresés... (Ctrl+F)">
</div>

<div class="container elokvali">
<table>
<thead>
<tr>
<th>#</th>
<th>Név</th>
<th>P1</th>
<th>P2</th>
<th>P3</th>
<th>Össz</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="no-result" id="noResult">
  Nincs találat
</div>

<div class="footer">
  Utolsó módosítás: 2026. 04. 27. | 14:32
</div>

<div class="container-sponsor-left"></div>
<div class="container-sponsor-right"></div>
<div class="container-sponsor-bottom"></div>

<script type="module" src="../../src/scripts/router.js"></script>
</body>
</html>
