<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Formula Series Results</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

</head>

<body>
<div class="bg-glow animate"></div>
<canvas id="particles"></canvas>

<div class="header">
  <div class="title">Rajtvonal <span>Formula Series</span></div>
  <div class="subtitle">EREDMÉNYEK</div>

  <div class="container navbar">
    <button id="defaultBtn" class="active" onclick="loadResults(this)">Összesített</button>
    <button onclick="showIndividual(this)">Egyéni</button>
    <button onclick="showTeams(this)">Konstruktőri</button>
    <button onclick="showStatistics(this)">Statisztikák</button>
    <button onclick="showRaces(this)">Versenyek</button>
    <button onclick="showQualifying(this)">Kvalifikációk</button>
  </div>

  <div class="container navbar" id="raceButtons" style="display:none; margin-top:20px;"></div>
</div>

<div class="container results">
<table>
<thead>
<tr></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">
  Rajtvonal Formula Series • Eredmények
  <br><br>
  Utolsó módosítás: 2026. 06. 20. | 10:55
</div>

<div class="container-sponsor-left pos-absolute"></div>
<div class="container-sponsor-right pos-absolute"></div>
<div class="container-sponsor-bottom"></div>

<script type="module" src="../../src/scripts/router.js"></script>
</body>
</html>
