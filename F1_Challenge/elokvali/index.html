<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Rajtvonal Előkvalifikáció</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../src/styles/theme.css">
<link rel="stylesheet" href="../src/styles/base.css">
<link rel="stylesheet" href="../src/styles/components.css">
<link rel="stylesheet" href="../src/styles/animations.css">
<link rel="stylesheet" href="../src/styles/pages.css">
</head>

<body>

<div class="bg-glow animate"></div>

<div class="back-button" onclick="goBack()">
  ← Vissza
</div>

<div class="theme-toggle" onclick="toggleTheme()">
  🌙
</div>

<div class="header">
  <div class="title">Rajtvonal <span>Előkvalifikáció</span></div>
  <div class="subtitle">LEADERBOARD</div>

  <div class="container navbar">
    <button id="defaultBtn" onclick="loadData('../database/F1/elokvali.csv', this)">F1 Challenge</button>
    <button onclick="loadData('../database/SM/elokvali.csv', this)">Sim Masters</button>
  </div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Keresés... (Ctrl+F)">
</div>

<div class="container elokvali">
<table>
<thead>
<tr>
<th>#</th>
<th>Név</th>
<th>P1</th>
<th>P2</th>
<th>P3</th>
<th>Össz</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="no-result" id="noResult">
  Nincs találat
</div>

<div class="footer">
  Legutóbbi módosítás: 2026. 04. 27. | 14:32
</div>

<script src="../src/scripts/laptimehandle.js"></script>
<script src="../src/scripts/searchbox.js"></script>
<script>initSearch({inputId: "search", noResultId: "noResult", mode: "table" });</script>
<script src="../src/scripts/themeswitch.js"></script>
<script src="../src/scripts/backbutton.js"></script>
<script src="script.js"></script>
</body>
</html>
