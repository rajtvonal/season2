<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>F1 Challenge Results</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../src/styles/theme.css">
<link rel="stylesheet" href="../src/styles/base.css">
<link rel="stylesheet" href="../src/styles/components.css">
<link rel="stylesheet" href="../src/styles/animations.css">
<link rel="stylesheet" href="../src/styles/pages.css">
</head>

<body>

<div class="bg-glow animate"></div>

<div class="back-button" onclick="goBack()">
  ← Vissza
</div>

<div class="theme-toggle" onclick="toggleTheme()">
  🌙
</div>

<div class="header">
  <div class="title">Rajtvonal <span>F1 Challenge</span></div>
  <div class="subtitle">EREDMÉNYEK</div>

  <div class="container navbar">
    <button id="defaultBtn" class="active" onclick="loadResults(this)">Összesített</button>
    <button onclick="showIndividual(this)">Egyéni</button>
    <button onclick="showTeams(this)">Konstruktőri</button>
    <button onclick="showStatistics(this)">Statisztikák</button>
    <button onclick="showRaces(this)">Versenyek</button>
  </div>

  <div class="container navbar" id="raceButtons" style="display:none; margin-top:20px;"></div>
</div>

<div class="container results">
<table>
<thead>
<tr></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">
  Utolsó módosítás: 2026. 04. 27. | 15:15
</div>

<script src="../src/scripts/laptimehandle.js"></script>
<script src="../src/scripts/themeswitch.js"></script>
<script src="../src/scripts/backbutton.js"></script>
<script src="script.js"></script>
</body>
</html>
