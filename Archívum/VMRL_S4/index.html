<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>LFBRL S1 Archív</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

</head>

<body>
<div class="bg-glow animate"></div>
<canvas id="particles"></canvas>

<div class="back-button" onclick="goBack()">
  ← Vissza
</div>

<div class="theme-toggle" onclick="toggleTheme()">
  🌙
</div>

<div class="header">
  <div class="title"><span>LFBRL Season 1 (Winter)</span></div>
  <div class="subtitle">EREDMÉNYEK</div>

  <div class="container navbar">
    <button id="defaultBtn" class="active" onclick="loadResults(this)">Összesített</button>
    <button onclick="showIndividual(this)">Egyéni</button>
    <button onclick="showTeams(this)">Konstruktőri</button>
    <button onclick="showStatistics(this)">Statisztikák</button>
    <button onclick="showRaces(this)">Versenyek</button>
    <button onclick="showQualifying(this)">Kvalifikációk</button>
  </div>

  <div class="container navbar" id="raceButtons" style="display:none; margin-top:20px;"></div>
</div>

<div class="container results" style="max-width: 1500px;">
<table>
<thead>
<tr></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">
  LFB Racing League • 2022 Archív 
</div>

<script type="module" src="../../src/scripts/router.js"></script>
</body>
</html>
